name: ClipB
options:
  bundleIdPrefix: com.clipb
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  minimumXcodeGenVersion: "2.40.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.clipb.app
    PRODUCT_NAME: ClipB
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_HARDENED_RUNTIME: YES

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"

targets:
  ClipB:
    type: application
    platform: macOS
    sources:
      - path: ClipB
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: ClipB/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClipB/ClipB.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - package: GRDB
      - package: KeyboardShortcuts
    info:
      path: ClipB/Info.plist

  ClipBTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClipBTests
    dependencies:
      - target: ClipB
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ClipB.app/Contents/MacOS/ClipB"
